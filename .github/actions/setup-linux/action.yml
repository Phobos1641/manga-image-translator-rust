name: Setup Linux

inputs:
  runs-on:
    required: false

runs:
  using: "composite"
  steps:
    - name: Maximize build space
      uses: justinthelaw/maximize-github-runner-space@ed391644e646cac4b88480d2f9b12d135f1ccf77 # v0.9.0
      with:
        cleanup-profile: max
        swapfile-size: 1G

    - name: Purge existing CUDA / NVIDIA packages
      shell: bash
      run: |
        sudo apt-get remove --purge -y \
          'cuda*' \
          'libcuda*' \
          'libnvidia*' \
          'nvidia-cuda*' \
          'libcublas*' \
          'libcufft*' \
          'libcurand*' \
          'libcusolver*' \
          'libcusparse*' \
          'libnvjpeg*' \
          'libnpp*' || true
        sudo apt-get autoremove -y
        sudo apt-get autoclean -y
        sudo rm -rf \
          /usr/local/cuda* \
          /usr/lib/x86_64-linux-gnu/libcuda* \
          /usr/lib/x86_64-linux-gnu/libcublas* \
          /etc/apt/sources.list.d/cuda* \
          /etc/apt/sources.list.d/nvidia*
        sudo apt-get update

    - name: Add NVIDIA CUDA repository
      shell: bash
      run: |
        CUDA_REPO_URL="https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64"
        wget -q "${CUDA_REPO_URL}/cuda-keyring_1.1-1_all.deb"
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update

    - name: Install CUDA 13.2
      shell: bash
      run: |
        sudo apt-get install -y --no-install-recommends \
          cuda-toolkit-13-2 \
          cuda-13-2 \
          cuda-libraries-dev-13-2 \
          libcublas-13-2 \
          libcublas13-dev-cuda-13

    - name: Add CUDA to PATH and LD_LIBRARY_PATH
      shell: bash
      run: |
        echo "/usr/local/cuda-13.2/bin" | sudo tee -a "$GITHUB_PATH"
        echo "LD_LIBRARY_PATH=/usr/local/cuda-13.2/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" | sudo tee -a "$GITHUB_ENV"

    - name: Verify CUDA installation
      shell: bash
      run: |
        nvcc --version
        dpkg -l | grep -E 'cuda|cublas'

    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get install --no-install-recommends -y pkg-config libssl-dev libopencv-dev clang libclang-dev libfontconfig-dev

    - name: Clean APT cache
      shell: bash
      run: sudo rm -r /var/cache/apt/archives/*

    - name: Check free space
      shell: bash
      run: df -h

    - name: Check swap space
      shell: bash
      run: swapon --show

    - name: Check RAM
      shell: bash
      run: free -m
