name: Setup Linux

inputs:
  runs-on:
    required: false

runs:
  using: "composite"
  steps:
    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: apt-${{ runner.os }}-${{ hashFiles('.github/actions/setup-linux/action.yml') }}
        restore-keys: |
          apt-${{ runner.os }}-

    - name: Fix apt cache permissions
      shell: bash
      run: sudo chown -R $(whoami) /var/cache/apt/archives /var/lib/apt/lists

    - name: Install dependencies
      shell: bash
      run: |
        sudo wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get install -y cuda-runtime-13-2 pkg-config libssl-dev libopencv-dev clang libclang-dev libfontconfig-dev

    - name: Maximize build space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 8196
        remove-dotnet: "true"
        remove-android: "true"
        remove-codeql: "true"
        remove-docker-images: "true"
        remove-haskell: "true"

    - name: Check free space
      shell: bash
      run: df -h
